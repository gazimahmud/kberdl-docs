site_name: "BER Data Lakehouse"
site_description: "Documentation for the KBase BER Data Lakehouse (K-BERDL) — a unified, AI-native data platform for DOE Biological and Environmental Research"
site_url: "https://gazimahmud.github.io/kberdl-docs/"

# Theme Configuration
theme:
  name: material
  # custom_dir: overrides # Removed as we moved files to docs/

  features:
    - navigation.instant
    - navigation.sections
    - navigation.tracking
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
    - header.autohide

  logo: assets/logo.svg
  favicon: assets/favicon.png

  font:
    text: Archivo
    code: Roboto Mono

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css
  - stylesheets/fonts.css

# Navigation
nav:

  - About K-BERDL: about.md

  - Architecture:
      - K-BERDL Architecture: architecture.md
      - Onboarding Guide: onboarding-guide.md
      - Tenant Model: tenant-model.md
      - Governance & Security: governance.md
  - Data Platform:
      - MinIO / Data Plane: data-plane-minio.md
      - Microbial Discovery Forge: microbial-discovery-forge.md
      - Ingestion Guide: data-ingestion-guide.md
  - Roadmap: roadmap.md

# Plugins
plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
