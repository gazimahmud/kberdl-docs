site_name = "BER Data Lakehouse"
site_url = "https://gazimahmud.github.io/kberdl-docs/"
site_description = "Documentation for the KBase BER Data Lakehouse (K-BERDL) — a unified, AI-native data platform for DOE Biological and Environmental Research"
extra_css = [
  "stylesheets/extra.css",
  "stylesheets/fonts.css"
]

[theme]
name = "material"
custom_dir = "overrides"
favicon = "assets/favicon.png"
features = [
  "navigation.instant",
  "navigation.sections",
  "navigation.tracking",
  "content.code.copy",
  "content.tabs.link",
  "search.highlight",
  "search.suggest",
  "header.autohide"
]

[theme.font]
text = "Archivo"
code = "Roboto Mono"

[theme.icon]
logo = "logo"

[[theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "material/weather-night"
toggle.name = "Switch to dark mode"

[[theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to light mode"

nav = [
  { "About K-BERDL" = "about.md" },
  { "Architecture" = [
      { "K-BERDL Architecture" = "architecture.md" },
      { "Onboarding Guide" = "onboarding-guide.md" },
      { "Tenant Model" = "tenant-model.md" },
      { "Governance & Security" = "governance.md" }
  ]},
  { "Data Platform" = [
      { "MinIO / Data Plane" = "data-plane-minio.md" },
      { "Microbial Discovery Forge" = "microbial-discovery-forge.md" },
      { "Ingestion Guide" = "data-ingestion-guide.md" }
  ]},
  { "Roadmap" = "roadmap.md" }
]
